<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ruta · Login</title><link rel="stylesheet" href="css/app.css"></head><body><main class="public-shell"><section class="auth-card"><div class="brand">🗺️ Ruta</div><h1>Entrar</h1><p class="muted">Acceso sencillo para continuar.</p><div class="field"><label>Contraseña</label><input id="pass" type="password" placeholder="Contraseña"></div><button class="btn primary full" onclick="login()">Ingresar</button><div id="msg"></div></section></main><script src="js/api.js"></script><script>function login(){let p=document.getElementById('pass').value.trim();if(p==='ruta2026'){localStorage.setItem(AUTH_KEY,'1');location.href='dashboard.html'}else{let m=document.getElementById('msg');m.className='notice error';m.textContent='Contraseña incorrecta.'}}document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')login()});</script></body></html>
